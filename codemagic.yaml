workflows:
android-release:
name: Aura Android Release
max_build_duration: 120

environment:
  java: 17

scripts:
  - name: Download dependencies
    script: |
      chmod +x gradlew
      ./gradlew --version

  - name: Build Debug APK
    script: |
      ./gradlew assembleDebug

artifacts:
  - app/build/outputs/**/*.apk
  - app/build/outputs/**/*.aab

publishing:
  email:
    recipients:
      - your-email@example.com
